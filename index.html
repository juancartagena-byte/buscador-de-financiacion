    <title>Buscador de Financiación</title>
    <!-- Descripción que aparece bajo el título en Google -->

      content="Encuentra fuentes de financiación para gestión del riesgo de desastres en Colombia. Consulta fondos como FNGRD, Fondo Adaptación, GCF, UNGRD y más de 30 fuentes nacionales e internacionales."
